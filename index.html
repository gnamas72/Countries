<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Globo 3D HD - Definitivo Touch Fix</title>
    <style>
        /* Blocco totale di qualsiasi movimento o rimbalzo nativo del browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e; /* Sfondo spazio */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Disattiva lo zoom e lo scroll della pagina nativi */
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* Pulsanti di Zoom Manuali d'emergenza per Smartphone */
        .zoom-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 999;
        }
        .zoom-btn {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.85);
            border: none;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            touch-action: manipulation;
        }
        .zoom-btn:active {
            transform: scale(0.9);
            background: #ffffff;
        }

        /* Widget dei Contatori in basso a destra */
        .stats-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            z-index: 998;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            font-size: 13px;
            font-weight: 700;
            color: #2c3e50;
        }
        .stat-badge {
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            min-width: 20px;
            text-align: center;
        }
        .badge-been { background-color: #2ecc71; }
        .badge-want { background-color: #00d2ff; color: #1a1a2e; font-weight: 800; }

        /* Interfaccia Popup / Modale dal basso */
        .modal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #2c3e50;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .popup-btn {
            border: none;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-been { background-color: #2ecc71; color: white; }
        .btn-want { background-color: #00d2ff; color: #1a1a2e; }
        .btn-reset { background-color: #95a5a6; color: white; }
        .popup-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="globe"></canvas>
        
        <!-- Pulsanti di Zoom per facilitare l'uso su Mobile -->
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomIn">＋</button>
            <button class="zoom-btn" id="zoomOut">－</button>
        </div>
        
        <!-- Pannello Contatori statistici -->
        <div class="stats-counter">
            <div class="stat-item">
                <span>Visitati (BEEN):</span>
                <span id="countBeen" class="stat-badge badge-been">0</span>
            </div>
            <div class="stat-item">
                <span>Desiderati (WANT):</span>
                <span id="countWant" class="stat-badge badge-want">0</span>
            </div>
        </div>
    </div>

    <!-- Pannello di Scelta (Modale) -->
    <div id="countryModal" class="modal">
        <div id="modalTitle" class="modal-title">Nazione</div>
        <div class="btn-group">
            <button class="popup-btn btn-been" onclick="updateStatus('BEEN')">BEEN</button>
            <button class="popup-btn btn-want" onclick="updateStatus('WANT')">WANT</button>
            <button class="popup-btn btn-reset" onclick="updateStatus('RESET')">Reset</button>
        </div>
    </div>

    <!-- Inclusione librerie D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script>
        const canvas = d3.select("#globe").node();
        const context = canvas.getContext("2d");
        const modal = document.getElementById("countryModal");
        const modalTitle = document.getElementById("modalTitle");

        let width = window.innerWidth;
        let height = window.innerHeight;
        
        let baseScale = Math.min(width, height) * 0.4;
        let currentScaleModifier = 1.0;

        const projection = d3.geoOrthographic()
            .scale(baseScale)
            .translate([width / 2, height / 2])
            .clipAngle(90); 

        const path = d3.geoPath(projection, context);

        let mapData = JSON.parse(localStorage.getItem('myWorldMapData3D_AllTerritories')) || {};
        let countries = null, selectedCountryFeature = null;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            context.scale(dpr, dpr);
            
            baseScale = Math.min(width, height) * 0.4;
            projection.scale(baseScale * currentScaleModifier).translate([width / 2, height / 2]);
            render();
        }

        function getFillColor(countryName) {
            const status = mapData[countryName];
            if (status === 'BEEN') return '#2ecc71';
            if (status === 'WANT') return '#00d2ff';
            return '#ffffff';
        }

        function updateCounters() {
            let beenCount = 0;
            let wantCount = 0;

            for (let key in mapData) {
                if (mapData[key] === 'BEEN') beenCount++;
                if (mapData[key] === 'WANT') wantCount++;
            }

            document.getElementById("countBeen").innerText = beenCount;
            document.getElementById("countWant").innerText = wantCount;
        }

        function render() {
            context.clearRect(0, 0, width, height);

            if (!countries) return;

            // 1. Oceano con gradiente radiale
            const radius = projection.scale();
            const center = projection.translate();
            const gradient = context.createRadialGradient(
                center[0] - radius/3, center[1] - radius/3, radius/10,
                center[0], center[1], radius
            );
            gradient.addColorStop(0, '#3a7bd5');
            gradient.addColorStop(1, '#3a6073');

            context.beginPath();
            path({type: "Sphere"});
            context.fillStyle = gradient;
            context.fill();

            // 2. Nazioni e Territori
            countries.features.forEach(feature => {
                context.beginPath();
                path(feature);
                const name = feature.properties.NAME || feature.properties.name || feature.properties.NAME_LONG;
                context.fillStyle = getFillColor(name);
                context.fill();
                context.strokeStyle = "#2c3e50";
                context.lineWidth = 0.4;
                context.stroke();
            });

            // 3. Evidenziazione selezione
            if (selectedCountryFeature) {
                context.beginPath();
                path(selectedCountryFeature);
                context.strokeStyle = "#e74c3c";
                context.lineWidth = 1.5;
                context.stroke();
            }
        }

        // --- RISCRITTURA COMPLETA ENGINE TOUCH (ZIG-ZAG E PINCH FIX) ---
        let lastTouchDistance = null;
        let isMovingGlobe = false;
        let lastTouchX, lastTouchY;
        let hasMovedSignificantly = false;

        // Disattiva i comportamenti di trascinamento elastico nativi di iOS Safari
        document.addEventListener('touchmove', function(e) {
            if(e.touches.length > 1 || isMovingGlobe) {
                e.preventDefault();
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', function(e) {
            modal.style.display = "none";
            hasMovedSignificantly = false;

            if (e.touches.length === 1) {
                isMovingGlobe = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isMovingGlobe = false; // Ferma la rotazione durante il pinch
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDistance = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', function(e) {
            // Caso 2 Dita: PINCH TO ZOOM PURISSIMO
            if (e.touches.length === 2 && lastTouchDistance !== null) {
                e.preventDefault(); // Blocca lo zoom del browser
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const currentDistance = Math.sqrt(dx * dx + dy * dy);

                const factor = currentDistance / lastTouchDistance;
                let newModifier = currentScaleModifier * factor;

                // Limiti di zoom (0.8x a 45x per scendere nel millimetrico)
                if (newModifier >= 0.8 && newModifier <= 45) {
                    currentScaleModifier = newModifier;
                    projection.scale(baseScale * currentScaleModifier);
                }

                lastTouchDistance = currentDistance;
                render();
            }
            // Caso 1 Dito: ROTAZIONE FLUIDA
            else if (e.touches.length === 1 && isMovingGlobe) {
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;

                // Se il dito si muove di più di 4 pixel, non è un click statico
                if (Math.abs(deltaX) > 4 || Math.abs(deltaY) > 4) {
                    hasMovedSignificantly = true;
                }

                const rotate = projection.rotate();
                const sensitivity = 55 / projection.scale();

                projection.rotate([
                    rotate[0] + deltaX * sensitivity,
                    rotate[1] - deltaY * sensitivity
                ]);

                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                render();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) lastTouchDistance = null;
            if (e.touches.length === 0) {
                isMovingGlobe = false;
                // Se l'utente ha solo toccato senza trascinare, esegui il click sulla nazione
                if (!hasMovedSignificantly && e.changedTouches.length === 1) {
                    processTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                }
            }
        });

        // FUNZIONE DI SELEZIONE STATO COMPATIBILE MOBILE
        function processTap(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;
            
            const geoPoint = projection.invert([mouseX, mouseY]);

            if (!geoPoint || isNaN(geoPoint[0])) {
                selectedCountryFeature = null;
                render();
                return;
            }

            const clicked = countries.features.find(f => d3.geoContains(f, geoPoint));

            if (clicked) {
                selectedCountryFeature = clicked;
                modalTitle.innerText = clicked.properties.NAME || clicked.properties.name || clicked.properties.NAME_LONG;
                modal.style.display = "block";
            } else {
                selectedCountryFeature = null;
            }
            render();
        }

        // --- AGGIUNTA PULSANTI DI ZOOM MANUALI CLICKABILI ---
        document.getElementById('zoomIn').addEventListener('click', () => {
            if (currentScaleModifier < 45) {
                currentScaleModifier *= 1.4;
                projection.scale(baseScale * currentScaleModifier);
                render();
            }
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            if (currentScaleModifier > 0.8) {
                currentScaleModifier /= 1.4;
                projection.scale(baseScale * currentScaleModifier);
                render();
            }
        });

        // SUPPORTO MOUSE PER PC (Rotella e click rimangono attivi)
        const mouseZoom = d3.zoom()
            .scaleExtent([0.8, 45])
            .on("zoom", (event) => {
                currentScaleModifier = event.transform.k;
                projection.scale(baseScale * currentScaleModifier);
                render();
            });
        
        // click su pc
        canvas.addEventListener('click', function(e) {
            if (window.matchMedia("(pointer: coarse)").matches) return; // Salta se siamo su touch
            processTap(e.clientX, e.clientY);
        });

        window.updateStatus = function(status) {
            if (!selectedCountryFeature) return;
            const name = selectedCountryFeature.properties.NAME || selectedCountryFeature.properties.name || selectedCountryFeature.properties.NAME_LONG;

            if (status === 'RESET') {
                delete mapData[name];
            } else {
                mapData[name] = status;
            }

            localStorage.setItem('myWorldMapData3D_AllTerritories', JSON.stringify(mapData));
            modal.style.display = "none";
            selectedCountryFeature = null;
            
            updateCounters(); 
            render();
        };

        window.addEventListener('pointerdown', (e) => {
            if (!modal.contains(e.target) && e.target !== canvas && !e.target.classList.contains('zoom-btn')) {
                modal.style.display = "none";
                selectedCountryFeature = null;
                render();
            }
        });

        // Caricamento definitivo del database cartografico
        d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_map_units.geojson").then(data => {
            countries = data;
            updateCounters(); 
            window.addEventListener("resize", resize);
            resize();
        });
    </script>
</body>
</html>
