<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Globo 3D Interattivo con Contatori</title>
    <style>
        /* Reset totale per smartphone e PC */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e; /* Sfondo spazio */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        /* Widget dei Contatori in basso a destra */
        .stats-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none; /* Impedisce al box di bloccare i tocchi sulla mappa */
            backdrop-filter: blur(5px); /* Effetto vetro sfocato */
            z-index: 999;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            font-size: 13px;
            font-weight: 700;
            color: #2c3e50;
        }
        .stat-badge {
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            min-width: 20px;
            text-align: center;
        }
        .badge-been { background-color: #2ecc71; }
        .badge-want { background-color: #00d2ff; color: #1a1a2e; font-weight: 800; }

        /* Interfaccia Popup / Modale dal basso */
        .modal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #2c3e50;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .popup-btn {
            border: none;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-been { background-color: #2ecc71; color: white; }
        .btn-want { background-color: #3498db; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        .popup-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="globe"></canvas>
        
        <!-- Pannello Contatori statistici -->
        <div class="stats-counter">
            <div class="stat-item">
                <span>Visitati (BEEN):</span>
                <span id="countBeen" class="stat-badge badge-been">0</span>
            </div>
            <div class="stat-item">
                <span>Desiderati (WANT):</span>
                <span id="countWant" class="stat-badge badge-want">0</span>
            </div>
        </div>
    </div>

    <!-- Pannello di Scelta (Modale) -->
    <div id="countryModal" class="modal">
        <div id="modalTitle" class="modal-title">Nazione</div>
        <div class="btn-group">
            <button class="popup-btn btn-been" onclick="updateStatus('BEEN')">BEEN</button>
            <button class="popup-btn btn-want" onclick="updateStatus('WANT')">WANT</button>
            <button class="popup-btn btn-reset" onclick="updateStatus('RESET')">Reset</button>
        </div>
    </div>

    <!-- Inclusione librerie D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <script>
        const canvas = d3.select("#globe").node();
        const context = canvas.getContext("2d");
        const modal = document.getElementById("countryModal");
        const modalTitle = document.getElementById("modalTitle");

        let width = window.innerWidth;
        let height = window.innerHeight;
        
        const projection = d3.geoOrthographic()
            .scale(Math.min(width, height) * 0.4)
            .translate([width / 2, height / 2])
            .clipAngle(90); 

        const path = d3.geoPath(projection, context);

        // Caricamento dati da localStorage
        let mapData = JSON.parse(localStorage.getItem('myWorldMapData3D')) || {};
        let worldData, countries, selectedCountryFeature = null;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            context.scale(dpr, dpr);
            projection.scale(Math.min(width, height) * 0.4).translate([width / 2, height / 2]);
            render();
        }

        function getFillColor(countryName) {
            const status = mapData[countryName];
            if (status === 'BEEN') return '#2ecc71';
            if (status === 'WANT') return '#00d2ff';
            return '#ffffff';
        }

        // Funzione per ricalcolare i contatori e aggiornare la grafica HTML
        function updateCounters() {
            let beenCount = 0;
            let wantCount = 0;

            for (let key in mapData) {
                if (mapData[key] === 'BEEN') beenCount++;
                if (mapData[key] === 'WANT') wantCount++;
            }

            document.getElementById("countBeen").innerText = beenCount;
            document.getElementById("countWant").innerText = wantCount;
        }

        function render() {
            context.clearRect(0, 0, width, height);

            if (!worldData) return;

            // 1. Oceano con gradiente radiale
            const radius = projection.scale();
            const center = projection.translate();
            const gradient = context.createRadialGradient(
                center[0] - radius/3, center[1] - radius/3, radius/10,
                center[0], center[1], radius
            );
            gradient.addColorStop(0, '#3a7bd5');
            gradient.addColorStop(1, '#3a6073');

            context.beginPath();
            path({type: "Sphere"});
            context.fillStyle = gradient;
            context.fill();

            // 2. Nazioni
            countries.features.forEach(feature => {
                context.beginPath();
                path(feature);
                context.fillStyle = getFillColor(feature.properties.name);
                context.fill();
                context.strokeStyle = "#2c3e50";
                context.lineWidth = 0.4;
                context.stroke();
            });

            // 3. Evidenziazione selezione
            if (selectedCountryFeature) {
                context.beginPath();
                path(selectedCountryFeature);
                context.strokeStyle = "#e74c3c";
                context.lineWidth = 1.5;
                context.stroke();
            }
        }

        // Interazioni di trascinamento e zoom
        const drag = d3.drag()
            .on("drag", (event) => {
                const rotate = projection.rotate();
                const k = 90 / projection.scale(); 
                projection.rotate([
                    rotate[0] + event.dx * k,
                    rotate[1] - event.dy * k
                ]);
                render();
            });

        const zoom = d3.zoom()
            .scaleExtent([0.5, 8])
            .on("zoom", (event) => {
                const baseScale = Math.min(width, height) * 0.4;
                projection.scale(baseScale * event.transform.k);
                render();
            });

        d3.select(canvas)
            .call(drag)
            .call(zoom)
            .on("click", handleClick);

        function handleClick(event) {
            modal.style.display = "none";
            const [mouseX, mouseY] = d3.pointer(event);
            const geoPoint = projection.invert([mouseX, mouseY]);

            if (!geoPoint || isNaN(geoPoint[0])) {
                selectedCountryFeature = null;
                render();
                return;
            }

            const clicked = countries.features.find(f => d3.geoContains(f, geoPoint));

            if (clicked) {
                selectedCountryFeature = clicked;
                modalTitle.innerText = clicked.properties.name;
                modal.style.display = "block";
            } else {
                selectedCountryFeature = null;
            }
            render();
        }

        window.updateStatus = function(status) {
            if (!selectedCountryFeature) return;
            const name = selectedCountryFeature.properties.name;

            if (status === 'RESET') {
                delete mapData[name];
            } else {
                mapData[name] = status;
            }

            localStorage.setItem('myWorldMapData3D', JSON.stringify(mapData));
            modal.style.display = "none";
            selectedCountryFeature = null;
            
            updateCounters(); // Aggiorna i numeri nel box
            render();
        };

        window.addEventListener('pointerdown', (e) => {
            if (!modal.contains(e.target) && e.target !== canvas) {
                modal.style.display = "none";
                selectedCountryFeature = null;
                render();
            }
        });

        // Inizializzazione dati geografici
        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(topology => {
            worldData = topology;
            countries = topojson.feature(worldData, worldData.objects.countries);
            
            updateCounters(); // Conta i dati esistenti al primo avvio
            window.addEventListener("resize", resize);
            resize();
        });
    </script>
</body>
</html>
