<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Globo 3D Interattivo</title>
    <style>
        /* Reset totale per sfruttare al massimo lo schermo dello smartphone */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5; /* Colore dello spazio/sfondo attorno al globo */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        /* Interfaccia Popup Touch-Friendly (Modale anziché popup agganciato) */
        .modal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #2c3e50;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .popup-btn {
            border: none;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-been { background-color: #2ecc71; color: white; }
        .btn-want { background-color: #3498db; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        .popup-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="globe"></canvas>
    </div>

    <!-- Pannello di Scelta (Modale) -->
    <div id="countryModal" class="modal">
        <div id="modalTitle" class="modal-title">Nazione</div>
        <div class="btn-group">
            <button class="popup-btn btn-been" onclick="updateStatus('BEEN')">BEEN</button>
            <button class="popup-btn btn-want" onclick="updateStatus('WANT')">WANT</button>
            <button class="popup-btn btn-reset" onclick="updateStatus('RESET')">Reset</button>
        </div>
    </div>

    <!-- Inclusione delle librerie D3.js per la gestione della sfera e della geometria -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <script>
        const canvas = d3.select("#globe").node();
        const context = canvas.getContext("2d");
        const modal = document.getElementById("countryModal");
        const modalTitle = document.getElementById("modalTitle");

        let width = window.innerWidth;
        let height = window.innerHeight;
        
        // Configurazione della proiezione Ortografica (rende la mappa una sfera 3D)
        const projection = d3.geoOrthographic()
            .scale(Math.min(width, height) * 0.4)
            .translate([width / 2, height / 2])
            .clipAngle(90); // Nasconde la faccia posteriore del mondo

        const path = d3.geoPath(projection, context);

        // Caricamento stati da LocalStorage
        let mapData = JSON.parse(localStorage.getItem('myWorldMapData3D')) || {};
        let worldData, countries, selectedCountryFeature = null;

        // Imposta le dimensioni del canvas ad alta risoluzione (Retina/DPR per smartphone)
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            context.scale(dpr, dpr);
            projection.scale(Math.min(width, height) * 0.4).translate([width / 2, height / 2]);
            render();
        }

        // Colori in base allo stato
        function getFillColor(countryName) {
            const status = mapData[countryName];
            if (status === 'BEEN') return '#2ecc71'; // Verde
            if (status === 'WANT') return '#3498db'; // Azzurro
            return '#ffffff'; // Bianco di base
        }

        // Rendering grafico sul Canvas (Disegna la sfera)
        function render() {
            context.clearRect(0, 0, width, height);

            if (!worldData) return;

            // 1. Disegna l'oceano (la sfera di base)
            context.beginPath();
            path({type: "Sphere"});
            context.fillStyle = "#e8ecef"; // Colore del mare molto tenue
            context.fill();

            // 2. Disegna ogni singola nazione colorata
            countries.features.forEach(feature => {
                context.beginPath();
                path(feature);
                context.fillStyle = getFillColor(feature.properties.name);
                context.fill();
                context.strokeStyle = "#bdc3c7"; // Contorno nazioni
                context.lineWidth = 0.5;
                context.stroke();
            });

            // 3. Evidenzia la nazione attualmente selezionata al click
            if (selectedCountryFeature) {
                context.beginPath();
                path(selectedCountryFeature);
                context.strokeStyle = "#e74c3c"; // Contorno rosso per evidenziare
                context.lineWidth = 1.5;
                context.stroke();
            }
        }

        // Gestione del Trascinamento (Rotazione) e dello Zoom
        const drag = d3.drag()
            .on("drag", (event) => {
                const rotate = projection.rotate();
                // Sensibilità di rotazione calcolata sulla scala di zoom attuale
                const k = 90 / projection.scale(); 
                projection.rotate([
                    rotate[0] + event.dx * k,
                    rotate[1] - event.dy * k
                ]);
                render();
            });

        const zoom = d3.zoom()
            .scaleExtent([0.5, 8]) // Limiti di zoom in e zoom out
            .on("zoom", (event) => {
                const baseScale = Math.min(width, height) * 0.4;
                projection.scale(baseScale * event.transform.k);
                render();
            });

        // Applica i controlli al canvas
        d3.select(canvas)
            .call(drag)
            .call(zoom)
            .on("click", handleClick);

        // Rileva quale stato è stato cliccato/tappato sulla sfera 3D
        function handleClick(event) {
            // Chiude il modal se era aperto
            modal.style.display = "none";
            
            const [mouseX, mouseY] = d3.pointer(event);
            const geoPoint = projection.invert([mouseX, mouseY]);

            // Se il click avviene fuori dalla sfera visibile, esce
            if (!geoPoint || isNaN(geoPoint[0])) {
                selectedCountryFeature = null;
                render();
                return;
            }

            // Cerca la nazione corrispondente alle coordinate cliccate
            const clicked = countries.features.find(f => d3.geoContains(f, geoPoint));

            if (clicked) {
                selectedCountryFeature = clicked;
                modalTitle.innerText = clicked.properties.name;
                modal.style.display = "block"; // Mostra il menu
            } else {
                selectedCountryFeature = null;
            }
            render();
        }

        // Cambia lo stato (BEEN/WANT/RESET) dalla finestra popup modale
        window.updateStatus = function(status) {
            if (!selectedCountryFeature) return;
            const name = selectedCountryFeature.properties.name;

            if (status === 'RESET') {
                delete mapData[name];
            } else {
                mapData[name] = status;
            }

            localStorage.setItem('myWorldMapData3D', JSON.stringify(mapData));
            modal.style.display = "none";
            selectedCountryFeature = null;
            render();
        };

        // Chiude il popup se si clicca fuori dal menu su PC/Telefono
        window.addEventListener('pointerdown', (e) => {
            if (!modal.contains(e.target) && e.target !== canvas) {
                modal.style.display = "none";
                selectedCountryFeature = null;
                render();
            }
        });

        // Scarica la mappa del mondo in formato vettoriale leggero (TopoJSON 1:110m)
        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(topology => {
            worldData = topology;
            // Converte il formato TopoJSON inGeoJSON utilizzabile per il disegno dei vettori
            countries = topojson.feature(worldData, worldData.objects.countries);
            
            // Avvia la mappa
            window.addEventListener("resize", resize);
            resize();
        });
    </script>
</body>
</html>
